    - "browsing duck-store source code"
    - "credential-stuffing"

authorisation:
  confirmed: true
  confirmed_by: "benchmark operator"

research_hosts:
  - nvd.nist.gov
  - www.exploit-db.com
  - raw.githubusercontent.com

benchmark:
  mode: true
  openapi_spec: "https://duck-store.escape.tech/openapi.json"
  register_account: true
  anti_walkthrough: true
