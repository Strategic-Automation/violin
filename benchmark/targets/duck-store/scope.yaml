  urls: ["https://duck-store.escape.tech"]
  ip_addresses: []
  in_scope_urls: ["https://duck-store.escape.tech"]

assessment_hosts:
  callback_hosts: []

authorised_parties: ["benchmark operator"]

rules_of_engagement:
  allowed_actions:
    - "host/port discovery"
    - "banner grabbing"
    - "version detection"
    - "vulnerability scanning"
    - "exploit validation (in-scope, non-destructive)"
